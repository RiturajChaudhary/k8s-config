apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: default
spec:
  selector:
    app: frontend-app
  type: NodePort
  ports:
    - protocol: TCP
      port: 80          # port exposed by the Service
      targetPort: 3000  # actual port your pod/container is listening on
      nodePort: 30007   # port to access on Minikube node
